<script>
const MODEL=JSON.parse(document.getElementById('model').textContent);
const C={purple:'#340C46',pmid:'#7D2776',plight:'#46235A',yellow:'#FDB940',cyan:'#0081BD',pink:'#C64B9B',orange:'#F68C3D',green:'#2E9E6B',red:'#D2483A',ink:'#1A0E22',muted:'#6E6878',tan:'#E5D8C2'};
const MN=['','jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
const GBI={};MODEL.grootboek.forEach(g=>GBI[g.id]=g);
const ENT_NAAM={E01:'Consultancy & Advies',E02:'Managed Services & Beheer',E03:'Software & Data'};
const YEARS=MODEL.meta.years;
const CAP_H=135; // benuttingsnorm: declarabele capaciteit per FTE per maand (geëxtrapoleerd)
const STATE={dash:'mgmt',year:'2025',gran:'jaar',period:'1',compare:'budget'};

function maxMonth(y){let mx=1;Object.keys(MODEL.fin_gb.GB010||{}).forEach(k=>{if(k.startsWith(y)){let m=+k.slice(5);if(m>mx)mx=m;}});return mx;}
function monthsFor(st){const y=st.year;
  if(st.gran==='maand')return [`${y}-${String(+st.period).padStart(2,'0')}`];
  if(st.gran==='kwartaal'){const q=+st.period,s=(q-1)*3+1;return [0,1,2].map(i=>`${y}-${String(s+i).padStart(2,'0')}`);}
  if(st.gran==='ytd'){const mx=maxMonth(y);return Array.from({length:mx},(_,i)=>`${y}-${String(i+1).padStart(2,'0')}`);}
  return Array.from({length:12},(_,i)=>`${y}-${String(i+1).padStart(2,'0')}`);}
function cmpFor(st){const cur=monthsFor(st);
  if(st.compare==='budget')return {months:cur,budget:true,label:'budget'};
  if(st.compare==='vorig_jaar'){const py=(+st.year-1)+'';return {months:cur.map(m=>py+m.slice(4)),budget:false,label:'vorig jaar'};}
  let pm;if(st.gran==='maand'){let m=+st.period-1,y=+st.year;if(m<1){m=12;y--;}pm=[`${y}-${String(m).padStart(2,'0')}`];}
  else if(st.gran==='kwartaal'){let q=+st.period-1,y=+st.year;if(q<1){q=4;y--;}const s=(q-1)*3+1;pm=[0,1,2].map(i=>`${y}-${String(s+i).padStart(2,'0')}`);}
  else{const py=(+st.year-1)+'';pm=cur.map(m=>py+m.slice(4));}
  return {months:pm,budget:false,label:'vorige periode'};}
function finSum(months,filt,ub){let s=0;MODEL.grootboek.forEach(g=>{if(!filt(g))return;const d=MODEL.fin_gb[g.id]||{};months.forEach(m=>{if(d[m])s+=d[m][ub?1:0];});});return s;}
const isBaten=g=>g.bl==='Baten',isDir=g=>g.c1==='Directe kosten',isIndir=g=>g.c1==='Indirecte kosten';
function finBlock(months,ub){const omzet=finSum(months,isBaten,ub),dir=finSum(months,isDir,ub),indir=finSum(months,isIndir,ub),ebitda=omzet-dir-indir;return {omzet,dir,indir,ebitda,bruto:omzet-dir,netto:ebitda*0.78};}
function urenSum(months){let d=0,n=0;months.forEach(m=>{const v=MODEL.prod_month[m];if(v){d+=v.dec;n+=v.ndec;}});return {dec:d,ndec:n,tot:d+n,has:(d+n)>0};}
function loonSum(months){let s=0;months.forEach(m=>{const v=MODEL.hr_month[m];if(v)s+=v.loonkosten;});return s;}
function fteMonths(months){let s=0;months.forEach(m=>{const v=MODEL.hr_month[m];if(v)s+=v.fte;});return s;}
function kostprijsUur(months){const u=urenSum(months);if(!u.has)return null;return loonSum(months)/u.tot;}
function benutting(months){const u=urenSum(months);const cap=fteMonths(months)*CAP_H;if(!u.has||!cap)return null;return 100*u.dec/cap;}
const eur=n=>'€ '+Math.round(n).toLocaleString('nl-NL');
const eurK=n=>'€ '+Math.round(n/1000).toLocaleString('nl-NL')+'k';
const eurM=n=>'€ '+(n/1e6).toFixed(2).replace('.',',')+'M';
const pct=n=>n.toFixed(1)+'%';
function delta(cur,cmp,goodUp=true){if(!cmp||!isFinite(cmp))return '';const d=(cur-cmp)/Math.abs(cmp)*100;const up=d>=0;const good=goodUp?up:!up;const cls=Math.abs(d)<0.05?'flat':good?'up':'down';const ar=Math.abs(d)<0.05?'■':up?'▲':'▼';return `<span class="kd ${cls}">${ar} ${Math.abs(d).toFixed(1)}% vs ${cmpFor(STATE).label}</span>`;}
function periodLabel(st){if(st.gran==='maand')return MN[+st.period]+' '+st.year;if(st.gran==='kwartaal')return 'Q'+st.period+' '+st.year;if(st.gran==='ytd')return 'YTD '+st.year;return st.year;}
let CH=[];function clearCH(){CH.forEach(c=>c.destroy());CH=[];}
function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;const c=new Chart(el,cfg);CH.push(c);return c;}
const gd={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Poppins',size:10.5},color:C.ink,boxWidth:11,padding:12}}},scales:{x:{grid:{display:false},ticks:{font:{family:'Poppins',size:10},color:C.muted}},y:{grid:{color:'rgba(52,12,70,.07)'},ticks:{font:{family:'Poppins',size:10},color:C.muted}}}};
function gdMoney(){const o=JSON.parse(JSON.stringify(gd));o.scales.y.ticks.callback=v=>'€'+(v/1000)+'k';return o;}

const NAV=[

 {id:'uren',label:'Uren & Nacalculatie',ic:'U',title:'Uren & Nacalculatie',sub:'Productieve vs. indirecte uren, uurtarief en nacalculatie.',dec:'Waar gaan declarabele uren verloren aan indirecte tijd — en wat kost dat aan dekking?'},

function icSvg(k){const m={M:'<rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>','€':'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',W:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h8"/>',P:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',U:'<line x1="6" y1="20" x2="6" y2="14"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="18" y1="20" x2="18" y2="10"/>',S:'<path d="M3 3v18h18"/><path d="M19 9l-5 5-4-4-3 3"/>',H:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/>'};return m[k]||'';}
function buildNav(){const nav=document.getElementById('nav');nav.innerHTML='';NAV.forEach(n=>{const d=document.createElement('div');d.className='navitem'+(n.id===STATE.dash?' active':'');d.innerHTML=`<span class="ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icSvg(n.ic)}</svg></span>${n.label}`;d.onclick=()=>{STATE.dash=n.id;render();};nav.appendChild(d);});}
function decision(t){return `<div class="decision"><div class="dic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2Z"/></svg></div><div class="dtxt"><b>Welke beslissing stuurt dit dashboard?</b><p>${t}</p></div></div>`;}
function kpi(l,v,o={}){return `<div class="kpi ${o.c||''} ${o.onclick?'click':''}" ${o.onclick?`onclick="${o.onclick}"`:''}><div class="kl">${l}</div><div class="kv">${v}</div>${o.delta||''}${o.note?`<div class="knote">${o.note}</div>`:''}</div>`;}

function render(){clearCH();buildNav();const meta=NAV.find(n=>n.id===STATE.dash);document.getElementById('dTitle').textContent=meta.title;document.getElementById('dSub').textContent=meta.sub+' · '+periodLabel(STATE);document.getElementById('canvas').innerHTML=decision(meta.dec)+'<div id="body"></div>';({mgmt:rMgmt,sales:rSales,fin:rFin,pl:rPL,proj:rProj,hr:rHR,uren:rUren})[STATE.dash](document.getElementById('body'));}

function hrAt(months){for(let i=months.length-1;i>=0;i--){const v=MODEL.hr_month[months[i]];if(v)return v;}return {fte:MODEL.hr_kpi.fte_now,headcount:MODEL.hr_kpi.headcount_now,loonkosten:0};}

/* ===== MANAGEMENT ===== */
function rMgmt(el){
  const m=monthsFor(STATE),cmp=cmpFor(STATE);const cur=finBlock(m,false),pre=finBlock(cmp.months,cmp.budget);
  const hc=hrAt(m);const ku=kostprijsUur(m);const bz=benutting(m);
  el.innerHTML=`<div class="kpis" style="grid-template-columns:repeat(4,1fr)">
   ${kpi('Omzet',eurM(cur.omzet),{delta:delta(cur.omzet,pre.omzet)})}
   ${kpi('EBITDA',eurM(cur.ebitda),{c:'gr',delta:delta(cur.ebitda,pre.ebitda)})}
   ${kpi('EBITDA-marge',pct(cur.omzet?100*cur.ebitda/cur.omzet:0),{c:'pu'})}
   ${kpi('Nettoresultaat',eurM(cur.netto),{c:'cy',note:'na ~22% belasting/rente (geëxtrapoleerd)'})}
   ${kpi('Brutomarge',pct(cur.omzet?100*cur.bruto/cur.omzet:0),{c:'pu'})}
   ${kpi('FTE / Headcount',`${hc.fte} <span class="sm">/ ${hc.headcount}</span>`,{c:'cy'})}
   ${kpi('Kostprijs per uur',ku!=null?eur(ku):'—',{c:'or',note:ku!=null?'loonkosten ÷ gewerkte uren':'geen urendata'})}
   ${kpi('Benuttingsgraad',bz!=null?pct(bz):'—',{c:bz!=null&&bz>=75?'gr':'pk',note:'norm 75% '+synth('capaciteitsnorm')})}

  drawOmzetBudget('m1');
  const ents=Object.keys(MODEL.fin_ent);const res=ents.map(e=>{let r=0;m.forEach(mm=>{const v=MODEL.fin_ent[e][mm];if(v)r+=v[0]-v[1];});return r;});
  mkChart('m2',{type:'bar',data:{labels:ents.map(e=>ENT_NAAM[e]||e),datasets:[{data:res,backgroundColor:[C.purple,C.cyan,C.pink],borderRadius:4,barPercentage:.6}]},options:gbar({plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:9},color:C.muted}},y:{grid:{color:'rgba(52,12,70,.07)'},ticks:{callback:v=>'€'+(v/1000)+'k',font:{size:10},color:C.muted}}}})});
  drawForecastChart('m3');
  renderSignals(document.getElementById('sig'),cur,bz);
}
function drawOmzetBudget(id){const ys=monthsFor({...STATE,gran:'jaar'});const oms=ys.map(mm=>finSum([mm],isBaten,false));const bud=ys.map(mm=>finSum([mm],isBaten,true));
  mkChart(id,{data:{labels:ys.map(x=>MN[+x.slice(5)]),datasets:[{type:'bar',label:'Realisatie',data:oms,backgroundColor:C.purple,borderRadius:4,barPercentage:.62},{type:'line',label:'Budget',data:bud,borderColor:C.yellow,borderWidth:2.5,pointRadius:0,tension:.3}]},options:Object.assign(gdMoney(),{onClick:()=>{STATE.dash='pl';render();}})});}
function forecastNums(){const y=STATE.year;const mx=maxMonth(y);const ytdM=Array.from({length:mx},(_,i)=>`${y}-${String(i+1).padStart(2,'0')}`);
  const restM=Array.from({length:12-mx},(_,i)=>`${y}-${String(mx+i+1).padStart(2,'0')}`);
  const realYTD=finSum(ytdM,isBaten,false);const budRest=finSum(restM,isBaten,true);const budFull=finSum(Array.from({length:12},(_,i)=>`${y}-${String(i+1).padStart(2,'0')}`),isBaten,true);
  const pace=mx?realYTD/finSum(ytdM,isBaten,true):1;const forecast=realYTD+budRest*(isFinite(pace)&&pace>0?pace:1);

function recurringMRR(){const rate={Abonnement:1500,SLA:2500,Raamcontract:1000};let mrr=0,n=0,seg={};MODEL.klanten.forEach(k=>{const v=rate[k.contract];if(v){mrr+=v;n++;seg[k.contract]=(seg[k.contract]||0)+v;}});return {mrr,n,seg};}
function mwYear(yr){const by={};MODEL.medewerkers.forEach(m=>by[m.id]=m);return (MODEL.uren_mw||[]).filter(x=>x.jaar===yr).map(x=>{const m=by[x.id]||{};const w=x.prod+x.opl+x.intern;const fte=m.fte||1;const avail=fte*1620;return {id:x.id,naam:x.naam,afd:x.afd,fte,prod:x.prod,verzuim:x.verzuim,bez:avail?100*w/avail:0,decl:w?100*x.prod/w:0};});}
function riskScore(p){let s=0;if(p.budget_pct>p.tijd_pct+12)s+=40;else if(p.budget_pct>p.tijd_pct)s+=15;if(p.voortgang<p.tijd_pct-12)s+=25;if(p.marge<15)s+=25;else if(p.marge<25)s+=10;if(p.status==='Kritiek')s+=20;else if(p.status==='Vertraging')s+=10;return Math.min(100,s);}
function uurtariefVal(months){const u=uurtarief(months);return u?u.tarief:120;}
function svgFunnel(stages){
  const N=stages.length,W=460,segH=46,gap=3,pad=6,end=0.20;
  const H=pad*2+N*segH+(N-1)*gap,cx=W/2,half=W*0.46;
  const fills=['#2A0A3A','#46235A','#5C2E78','#7D2776','#9A3E8C','#C64B9B'];
  const hw=i=>half*(1-(i/N)*(1-end)); // lineair versmallend -> klassieke trechter
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-height:350px;display:block;margin-top:6px" preserveAspectRatio="xMidYMid meet">`;
  stages.forEach((st,i)=>{
    const y0=pad+i*(segH+gap),y1=y0+segH,wT=hw(i),wB=hw(i+1);
    s+=`<polygon points="${cx-wT},${y0} ${cx+wT},${y0} ${cx+wB},${y1} ${cx-wB},${y1}" fill="${fills[i%fills.length]}"/>`;
    s+=`<text x="${cx}" y="${y0+segH/2-2}" text-anchor="middle" fill="#fff" font-size="12.5" font-weight="600" font-family="Poppins">${st.label}</text>`;
    s+=`<text x="${cx}" y="${y0+segH/2+14}" text-anchor="middle" fill="rgba(255,255,255,.85)" font-size="10.5" font-family="Poppins">${st.n} deals \u00b7 ${eurK(st.waarde)} \u00b7 ${st.uren.toLocaleString('nl-NL')} u</text>`;
    if(stages[i+1]){const conv=st.n?Math.round(100*stages[i+1].n/st.n):0;s+=`<text x="${W-4}" y="${y1+gap+11}" text-anchor="end" fill="#7D2776" font-size="10" font-weight="600" font-family="Poppins">\u2193 ${conv}%</text>`;}
  });
  s+='</svg>';return s;
}

}
function declAvgU(months){let d=0,n=0;months.forEach(mm=>{const v=MODEL.prod_month[mm];if(v){d+=v.dec;n+=v.ndec;}});return (d+n)?100*d/(d+n):0;}

function drawHeat(){

  const W=26; // eerste halfjaar tonen voor leesbaarheid

    for(let w=0;w<W;w++){const u=wk[w]||0;const pct=m.fte?100*u/(m.fte*40):0;const col=u===0?'#EEE7DC':pct<70?C.cyan:pct<=95?C.green:pct<=110?C.yellow:C.red;h+=`<div title="wk${w+1}: ${u}u (${pct.toFixed(0)}%)" style="height:16px;border-radius:2px;background:${col}"></div>`;}});

}

  const vzM=Object.entries(MODEL.verzuim_month).filter(([k])=>m.includes(k)).map(([,v])=>v);
  const vzPct=vzM.length?(vzM.reduce((s,v)=>s+v.pct,0)/vzM.length):0;
  const meld=vzM.reduce((s,v)=>s+v.kort+v.middel+v.lang,0);const dagen=vzM.reduce((s,v)=>s+v.dagen,0);
  const ages={'<25':0,'25-34':0,'35-44':0,'45-54':0,'55+':0};mws.forEach(x=>{const a=x.leeftijd;ages[a<25?'<25':a<35?'25-34':a<45?'35-44':a<55?'45-54':'55+']++;});
  const opl=m.reduce((s,mm)=>s+((MODEL.uren_act_month[mm]||{}).opl||0),0);const fteSum=fteMonths(m)||1;
  el.innerHTML=`<div style="margin-bottom:10px"><span class="synthtag">verloop, vacatures, time-to-hire en MTO geëxtrapoleerd — niet in de bron</span></div>
   <div class="kpis" style="grid-template-columns:repeat(5,1fr)">
   ${kpi('Headcount',MODEL.hr_kpi.headcount_now,{c:'cy'})}
   ${kpi('FTE',MODEL.hr_kpi.fte_now,{c:'pu'})}
   ${kpi('Gem. diensttijd',MODEL.hr_kpi.gem_diensttijd+' jr',{})}
   ${kpi('Verzuim',vzPct.toFixed(1)+'%',{c:vzPct>4?'pk':'gr'})}
   ${kpi('Verloop (12 mnd)','11,3%',{c:'or',note:synth('')})}
   </div>
   <div class="grid" style="grid-template-columns:1.4fr 1fr">
     <div class="panel"><h3>Verzuim per maand <span class="hint">% + duurklassen</span></h3><div class="cwrap tall"><canvas id="h1"></canvas></div></div>
     <div class="panel"><h3>Leeftijdsopbouw <span class="hint">demografische piramide ${synth('leeftijd')}</span></h3><div class="cwrap tall"><canvas id="h2"></canvas></div></div>
   </div>
   <div class="grid" style="grid-template-columns:repeat(4,1fr);margin-top:15px">
     ${kpi('Verzuimfrequentie',(meld/(MODEL.hr_kpi.headcount_now||1)).toFixed(2),{note:'meldingen per mw'})}
     ${kpi('Gem. verzuimduur',meld?(dagen/meld).toFixed(1)+' dgn':'—',{})}
     ${kpi('Opleidingsuren/FTE',(opl/fteSum).toFixed(1)+' u',{c:'cy'})}
     ${kpi('Open vacatures','7',{c:'pk',note:'2 > 60 dgn '+synth('')})}
   </div>
   <div class="grid" style="grid-template-columns:1fr 1fr;margin-top:15px">
     <div class="panel"><h3>Verloop &amp; werving ${synth('')}</h3><div class="cwrap"><canvas id="h3"></canvas></div></div>
     <div class="panel"><h3>Burn-out &amp; talent-risico <span class="hint">signalering</span></h3><div id="hrisk"></div></div>
   </div>`;
  // verzuim chart (duurklasse + %)
  const ys=monthsFor({...STATE,gran:'jaar'});
  mkChart('h1',{data:{labels:ys.map(x=>MN[+x.slice(5)]),datasets:[
    {type:'bar',label:'Kort',data:ys.map(mm=>(MODEL.verzuim_month[mm]||{}).kort||0),backgroundColor:C.cyan,stack:'s',borderRadius:2},
    {type:'bar',label:'Middel',data:ys.map(mm=>(MODEL.verzuim_month[mm]||{}).middel||0),backgroundColor:C.purple,stack:'s',borderRadius:2},
    {type:'bar',label:'Lang',data:ys.map(mm=>(MODEL.verzuim_month[mm]||{}).lang||0),backgroundColor:C.orange,stack:'s',borderRadius:2},
    {type:'line',label:'Verzuim %',data:ys.map(mm=>(MODEL.verzuim_month[mm]||{}).pct??null),borderColor:C.pink,borderWidth:2.5,pointRadius:2,yAxisID:'y1',tension:.35}
  ]},options:gbar({scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:10},color:C.muted}},y:{stacked:true,grid:{color:'rgba(52,12,70,.07)'},ticks:{font:{size:10},color:C.muted}},y1:{position:'right',min:0,max:8,grid:{display:false},ticks:{callback:v=>v+'%',font:{size:10},color:C.muted}}}})});
  // leeftijdspiramide (man links negatief, vrouw rechts)
  const man=Object.keys(ages).map(k=>-mws.filter(x=>x.gesl==='Man'&&bucket(x.leeftijd)===k).length);
  const vrouw=Object.keys(ages).map(k=>mws.filter(x=>x.gesl==='Vrouw'&&bucket(x.leeftijd)===k).length);
  mkChart('h2',{type:'bar',data:{labels:Object.keys(ages),datasets:[{label:'Man',data:man,backgroundColor:C.cyan},{label:'Vrouw',data:vrouw,backgroundColor:C.pink}]},options:gbar({indexAxis:'y',scales:{x:{stacked:true,grid:{color:'rgba(52,12,70,.07)'},ticks:{callback:v=>Math.abs(v),font:{size:10},color:C.muted}},y:{stacked:true,grid:{display:false},ticks:{font:{size:10},color:C.muted}}}})});
  // verloop & werving synth
  mkChart('h3',{data:{labels:MN.slice(1),datasets:[
    {type:'bar',label:'Instroom',data:[3,2,4,2,3,1,2,3,2,4,2,1],backgroundColor:C.green,borderRadius:3,categoryPercentage:.7},
    {type:'bar',label:'Uitstroom',data:[1,2,2,3,1,2,1,2,3,1,2,2],backgroundColor:C.red,borderRadius:3,categoryPercentage:.7},
    {type:'line',label:'Time-to-hire (dgn)',data:[44,46,41,48,43,45,42,40,47,44,43,41],borderColor:C.orange,borderWidth:2,pointRadius:0,yAxisID:'y1',tension:.3}
  ]},options:gbar({scales:{x:{grid:{display:false},ticks:{font:{size:9},color:C.muted}},y:{grid:{color:'rgba(52,12,70,.07)'},ticks:{font:{size:10},color:C.muted}},y1:{position:'right',grid:{display:false},ticks:{font:{size:10},color:C.muted}}}})});
  // risk lists
  const mw=mwYear(STATE.year);const burn=mw.filter(x=>x.bez>105||x.verzuim>120).sort((a,b)=>b.bez-a.bez).slice(0,5);
  const talent=mw.filter(x=>x.decl>=90).sort((a,b)=>b.decl-a.decl).slice(0,5);
  let rh='<div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--red);font-weight:600;margin-bottom:4px">Burn-out risico</div>';
  rh+= burn.length?burn.map(x=>`<div style="font-size:12px;color:var(--ink-soft);padding:2px 0">${x.naam} · bezetting ${x.bez.toFixed(0)}% · ${x.afd}</div>`).join(''):'<div style="font-size:12px;color:var(--muted)">geen</div>';
  rh+='<div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--yellow-deep);font-weight:600;margin:12px 0 4px">Talent-risico (hoog declarabel + lage MTO)</div>';
  rh+= talent.map(x=>`<div style="font-size:12px;color:var(--ink-soft);padding:2px 0">${x.naam} · ${x.decl.toFixed(0)}% declarabel · MTO ${(5.6+(x.id.charCodeAt(4)%10)/10-1).toFixed(1)} ${synth('')}</div>`).join('');
  document.getElementById('hrisk').innerHTML=rh;
}
function bucket(a){return a<25?'<25':a<35?'25-34':a<45?'35-44':a<55?'45-54':'55+';}

/* ===== controls ===== */
function buildControls(){const fy=document.getElementById('fYear');fy.innerHTML=YEARS.map(y=>`<option ${y===STATE.year?'selected':''}>${y}</option>`).join('');
  fy.onchange=e=>{STATE.year=e.target.value;render();};
  document.getElementById('fGran').onchange=e=>{STATE.gran=e.target.value;syncP();render();};
  document.getElementById('fCompare').onchange=e=>{STATE.compare=e.target.value;render();};
  document.getElementById('fPeriod').onchange=e=>{STATE.period=e.target.value;render();};
  syncP();}
function syncP(){const g=document.getElementById('gPeriod'),fp=document.getElementById('fPeriod');
  if(STATE.gran==='kwartaal'){g.style.display='';fp.innerHTML=[1,2,3,4].map(q=>`<option value="${q}">Q${q}</option>`).join('');if(STATE.period>4)STATE.period='1';}
  else if(STATE.gran==='maand'){g.style.display='';fp.innerHTML=MN.slice(1).map((m,i)=>`<option value="${i+1}">${m}</option>`).join('');}
  else g.style.display='none';}
buildControls();render();
window.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
